<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Daily Timer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="header-row">
      <h2 class="title">Daily Timer</h2>
      <button id="open-fixed-button" class="open-fixed-button">Abrir em janela fixa</button>
    </div>
    <div class="status-row">
      <span id="fixed-window-status">Nenhuma janela fixa</span>
    </div>

    <div class="theme-row">
      <label for="theme-select">Tema:</label>
      <select id="theme-select">
        <option value="default">Padrão</option>
        <option value="dark">Escuro</option>
        <option value="minimal">Minimalista</option>
        <option value="colorful">Colorido</option>
      </select>
    </div>

    <div class="participant-row">
      <input id="participant-input" type="text" placeholder="Nome">
      <button id="add-participant">+</button>
    </div>

    <ul id="participants-list"></ul>

    <div class="time-row">
      <label class="time-label">Tempo por pessoa:</label>
      <input id="minutes-input" type="number" min="0" max="60" value="2" class="time-input">
      <span class="time-unit">min</span>
      <input id="seconds-input" type="number" min="0" max="59" value="30" class="time-input">
      <span class="time-unit">seg</span>
    </div>

    <div>
      <label>
        <input id="sound-checkbox" type="checkbox" checked> Alerta sonoro
      </label>
    </div>

    <div class="speaker-timer-row">
      <div id="timer-display">00:00</div>
      <div id="current-speaker">Nenhum participante</div>
    </div>

    <div class="action-row">
      <button id="start-button" class="action-button">Iniciar</button>
      <button id="next-button" class="action-button">Próximo</button>
      <button id="reset-button" class="action-button">Resetar</button>
      <button id="new-daily" class="action-button">Nova daily</button>
    </div>

    <audio id="beep-audio">
      <source src="https://media.geeksforgeeks.org/wp-content/uploads/20190531135120/beep.mp3" type="audio/mpeg">
    </audio>

    <script src="popup.js"></script>
  </body>
</html>
